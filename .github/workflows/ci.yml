name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi

          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "docs=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BASE"..HEAD)

          code=false
          docs=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              src/*|tests/*|*.props|.github/workflows/*) code=true ;;
            esac
            case "$file" in
              *.md|docs/*) docs=true ;;
            esac
          done <<< "$CHANGED"

          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "docs=$docs" >> "$GITHUB_OUTPUT"

  markdownlint:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run markdownlint
        run: npx markdownlint-cli2 '**/*.md'

  build:
    needs: [changes, markdownlint]
    if: always() && needs.changes.outputs.code == 'true' && needs.markdownlint.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build src/ShellComplete -c Release

      - name: Test
        run: dotnet run --project tests/ShellComplete.Tests -c Release

      - name: Pack
        run: dotnet pack src/ShellComplete -c Release --no-build

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: package
          path: artifacts/package/release/*.nupkg
